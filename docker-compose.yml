version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: yumcut_db
    restart: always
    environment:
      MYSQL_DATABASE: yumcut
      MYSQL_ROOT_PASSWORD: STRONG_ROOT_PASSWORD
      MYSQL_USER: yumcut
      MYSQL_PASSWORD: STRONG_PASSWORD
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: yumcut_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Use the service name 'db' as the hostname
      DATABASE_URL: "mysql://yumcut:STRONG_PASSWORD@db:3306/yumcut"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
