version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: yumcut_db
    restart: always
    environment:
      MYSQL_DATABASE: yumcut
      # Root password for system-level changes
      MYSQL_ROOT_PASSWORD: "K9x#vL2p9Z!mQ8R4tT7y*BvWn"
      # Dedicated app user
      MYSQL_USER: yumcut
      MYSQL_PASSWORD: "aG5^mN1jS9#dL4qP2zWk*Xr8T"
    ports:
      # Map Host 8082 to Container 3306
      - "8082:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: yumcut_app
    restart: always
    ports:
      # Map Host 8083 to Container 3000
      - "8083:3000"
    environment:
      # Internal networking: Host is 'db', Port is '3306' (Internal)
      DATABASE_URL: "mysql://yumcut:aG5^mN1jS9#dL4qP2zWk*Xr8T@db:3306/yumcut"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
